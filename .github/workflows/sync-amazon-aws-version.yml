name: Sync amazon.aws.version

# Self-healing guard for AWS SDK version drift (TECHOPS-911).
#
# amazon.aws.version in pom.xml must match the AWS SDK shaded into liquibase-aws-extension
# for the current liquibase-secure version (aws-sdk.version in the liquibase-pro root pom at
# tag v<liquibase-secure.version>). When liquibase-secure is bumped, the
# dependabot-sync-and-merge workflow normally syncs both in the same PR. This workflow is the
# catch-all for cases where no such PR exists (drift discovered independently): on a schedule
# (and on demand) it detects drift and opens/updates a PR bumping amazon.aws.version, then
# enables auto-merge so it merges only after the required checks pass.
#
# Follows GitHub's recommended pattern: peter-evans/create-pull-request to open the PR
# (idempotent — updates the existing PR on the same branch instead of creating duplicates),
# and `gh pr merge --auto` to merge once required status checks (verify-amazon-aws-version) pass.

on:
  schedule:
    - cron: '17 6 * * *' # daily at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: sync-amazon-aws-version
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Detect amazon.aws.version drift
        id: drift
        env:
          GH_TOKEN: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}
        run: |
          set -euo pipefail
          SECURE_VERSION=$(grep -oE '<liquibase-secure.version>[^<]+</liquibase-secure.version>' pom.xml | head -1 | sed -E 's/<\/?liquibase-secure.version>//g')
          LOCAL=$(grep -oE '<amazon.aws.version>[^<]+</amazon.aws.version>' pom.xml | head -1 | sed -E 's/<\/?amazon.aws.version>//g')
          UPSTREAM=$(gh api "repos/liquibase/liquibase-pro/contents/pom.xml?ref=v${SECURE_VERSION}" --jq '.content' \
            | base64 -d \
            | grep -oE '<aws-sdk.version>[^<]+</aws-sdk.version>' \
            | head -1 \
            | sed -E 's/<\/?aws-sdk.version>//g')
          echo "liquibase-secure: $SECURE_VERSION"
          echo "aws-sdk.version (source of truth): ${UPSTREAM:-<empty>}"
          echo "amazon.aws.version (this repo):    ${LOCAL:-<empty>}"
          if [ -z "$UPSTREAM" ]; then
            echo "::error::Could not read aws-sdk.version from liquibase-pro at tag v${SECURE_VERSION}."
            exit 1
          fi
          {
            echo "secure_version=$SECURE_VERSION"
            echo "local=$LOCAL"
            echo "upstream=$UPSTREAM"
          } >> "$GITHUB_OUTPUT"
          if [ "$UPSTREAM" = "$LOCAL" ]; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
            echo "✅ amazon.aws.version already in sync at $LOCAL"
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Drift: pinned $LOCAL but liquibase-secure $SECURE_VERSION shades $UPSTREAM"
          fi

      - name: Apply amazon.aws.version bump
        if: steps.drift.outputs.drifted == 'true'
        run: |
          set -euo pipefail
          sed -i.bak -E "s|<amazon.aws.version>[^<]+</amazon.aws.version>|<amazon.aws.version>${{ steps.drift.outputs.upstream }}</amazon.aws.version>|g" pom.xml
          rm -f pom.xml.bak

      # Idempotent: updates the existing PR on this branch instead of opening duplicates.
      # Uses the PAT so the created PR triggers the required checks (GITHUB_TOKEN would not).
      - name: Create or update PR
        if: steps.drift.outputs.drifted == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}
          branch: chore/sync-amazon-aws-version
          base: main
          commit-message: "chore: sync amazon.aws.version to ${{ steps.drift.outputs.upstream }} for liquibase-secure ${{ steps.drift.outputs.secure_version }}"
          title: "[TECHOPS-911] Sync amazon.aws.version to ${{ steps.drift.outputs.upstream }} (liquibase-secure ${{ steps.drift.outputs.secure_version }})"
          body: |
            Automated AWS SDK drift fix.

            `amazon.aws.version` (`${{ steps.drift.outputs.local }}`) does not match the AWS SDK
            shaded into liquibase-aws-extension for liquibase-secure `${{ steps.drift.outputs.secure_version }}`
            (`aws-sdk.version` = `${{ steps.drift.outputs.upstream }}` in liquibase-pro `v${{ steps.drift.outputs.secure_version }}`).

            This PR bumps the pin to `${{ steps.drift.outputs.upstream }}`. It auto-merges once the
            required `verify-amazon-aws-version` check passes. See TECHOPS-911.
          labels: sdou
          delete-branch: true

      - name: Enable auto-merge
        if: steps.drift.outputs.drifted == 'true' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}
        run: |
          echo "Enabling auto-merge on PR #${{ steps.cpr.outputs.pull-request-number }} (waits for required checks)..."
          gh pr merge --auto --merge "${{ steps.cpr.outputs.pull-request-number }}"

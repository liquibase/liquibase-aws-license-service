name: Dependabot - Sync Versions and Auto-merge

# This workflow ensures Dockerfile and pom.xml stay synchronized when Dependabot updates liquibase-secure versions
#
# Purpose:
# - Synchronizes liquibase-secure.version between Dockerfile and pom.xml
# - Consolidates two separate Dependabot PRs into one
# - Auto-merges after version sync and tests pass
#
# Problem it solves:
# - Dependabot creates separate PRs for Docker (Dockerfile) and Maven (pom.xml) updates
# - Without this workflow, versions can get out of sync if only one PR merges
# - Manual merging of both PRs is error-prone and time-consuming
#
# How it works:
# - Triggers when Dependabot opens/updates a PR modifying Dockerfile or pom.xml
# - Checks if the Dockerfile was modified in the PR (via git diff against merge base)
# - For Dockerfile PRs only: extracts liquibase-secure version and syncs pom.xml to match
# - Skips version sync for non-Dockerfile PRs to prevent stale branch regressions
# - Auto-merges the PR after all checks pass
# - For liquibase-secure updates: triggers auto-trigger-marketplace-deployment.yml
#   to validate the version change and initiate a dry-run deployment
#
# Result:
# - Single PR with both files synchronized (for Dockerfile PRs)
# - No manual intervention needed
# - Prevents version mismatches between build and runtime
# - Prevents stale branches from regressing pom.xml to older versions
# - Marketplace deployment pipeline starts reliably without depending on push events

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'Dockerfile'
      - 'pom.xml'

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  sync-and-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.repository == 'liquibase/liquibase-aws-license-service'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      # Step 1: Check if this PR modifies the Dockerfile (liquibase-secure update)
      # Only sync versions when Dockerfile is changed — syncing from a stale branch
      # Dockerfile can regress pom.xml to an older version (see PR #509 incident)
      - name: Check if Dockerfile changed in this PR
        id: check_dockerfile_changed
        run: |
          # Compare the PR branch against its merge base with main to see if Dockerfile was modified
          MERGE_BASE=$(git merge-base HEAD origin/main)
          if git diff --name-only "$MERGE_BASE" HEAD | grep -q '^Dockerfile$'; then
            echo "dockerfile_changed=true" >> $GITHUB_OUTPUT
            echo "✅ Dockerfile was modified in this PR — will sync versions"
          else
            echo "dockerfile_changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Dockerfile not modified in this PR — skipping version sync"
          fi

      # Step 2: Sync pom.xml version to match Dockerfile (only for Dockerfile PRs)
      - name: Extract version from Dockerfile
        if: steps.check_dockerfile_changed.outputs.dockerfile_changed == 'true'
        id: extract_dockerfile_version
        run: |
          DOCKERFILE_VERSION=$(grep -E '^FROM liquibase/liquibase-secure:' Dockerfile | head -1 | cut -d':' -f2 | cut -d' ' -f1)
          echo "Dockerfile version: $DOCKERFILE_VERSION"
          echo "dockerfile_version=$DOCKERFILE_VERSION" >> $GITHUB_OUTPUT

      - name: Extract version from pom.xml
        if: steps.check_dockerfile_changed.outputs.dockerfile_changed == 'true'
        id: extract_pom_version
        run: |
          POM_VERSION=$(grep -oE '<liquibase-secure.version>[^<]+</liquibase-secure.version>' pom.xml | sed -E 's/<\/?liquibase-secure.version>//g')
          echo "pom.xml version: $POM_VERSION"
          echo "pom_version=$POM_VERSION" >> $GITHUB_OUTPUT

      - name: Check if versions match
        if: steps.check_dockerfile_changed.outputs.dockerfile_changed == 'true'
        id: check_versions
        run: |
          DOCKERFILE_VER="${{ steps.extract_dockerfile_version.outputs.dockerfile_version }}"
          POM_VER="${{ steps.extract_pom_version.outputs.pom_version }}"

          if [ "$DOCKERFILE_VER" != "$POM_VER" ]; then
            echo "versions_match=false" >> $GITHUB_OUTPUT
            echo "❌ Versions do not match. Dockerfile: $DOCKERFILE_VER, pom.xml: $POM_VER"
          else
            echo "versions_match=true" >> $GITHUB_OUTPUT
            echo "✅ Versions already match: $DOCKERFILE_VER"
          fi

      - name: Update pom.xml with Dockerfile version
        if: steps.check_dockerfile_changed.outputs.dockerfile_changed == 'true' && steps.check_versions.outputs.versions_match == 'false'
        run: |
          NEW_VERSION="${{ steps.extract_dockerfile_version.outputs.dockerfile_version }}"
          echo "Updating pom.xml liquibase-secure.version to: $NEW_VERSION"

          sed -i.bak -E "s|<liquibase-secure.version>[^<]+</liquibase-secure.version>|<liquibase-secure.version>$NEW_VERSION</liquibase-secure.version>|g" pom.xml
          rm -f pom.xml.bak

          echo "Updated section in pom.xml:"
          grep -B2 -A2 "liquibase-secure.version" pom.xml

      - name: Commit version sync
        if: steps.check_dockerfile_changed.outputs.dockerfile_changed == 'true' && steps.check_versions.outputs.versions_match == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          if ! git diff --quiet pom.xml; then
            git add pom.xml
            git commit -m "chore: sync liquibase-secure.version in pom.xml to ${{ steps.extract_dockerfile_version.outputs.dockerfile_version }}

          This commit automatically synchronizes the liquibase-secure.version property in pom.xml
          to match the version updated by Dependabot in the Dockerfile.

          Dockerfile version: ${{ steps.extract_dockerfile_version.outputs.dockerfile_version }}
          Previous pom.xml version: ${{ steps.extract_pom_version.outputs.pom_version }}"
                      git push
                      echo "✅ Successfully pushed pom.xml update"
                    fi

      - name: Comment on PR about version sync
        if: steps.check_dockerfile_changed.outputs.dockerfile_changed == 'true' && steps.check_versions.outputs.versions_match == 'false'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const dockerfileVersion = '${{ steps.extract_dockerfile_version.outputs.dockerfile_version }}';
            const pomVersion = '${{ steps.extract_pom_version.outputs.pom_version }}';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔄 **Automated Version Sync**

              I've automatically synchronized the \`liquibase-secure.version\` in \`pom.xml\` to match the Dockerfile update.

              | File | Previous Version | New Version |
              |------|-----------------|-------------|
              | Dockerfile | - | \`${dockerfileVersion}\` |
              | pom.xml | \`${pomVersion}\` | \`${dockerfileVersion}\` |

              Both files now reference the same Liquibase Secure version.`
                          });

      # Step 3: Auto-merge the PR after sync
      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.5.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-merge Dependabot PR
        run: |
          echo "✅ Versions are now synchronized. Auto-merging PR..."
          gh pr merge --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}

      # Step 4: Trigger marketplace deployment for liquibase-secure updates
      - name: Trigger marketplace deployment validation
        if: steps.check_dockerfile_changed.outputs.dockerfile_changed == 'true' && contains(steps.metadata.outputs.dependency-names, 'liquibase/liquibase-secure')
        run: |
          NEW_VERSION="${{ steps.extract_dockerfile_version.outputs.dockerfile_version }}"
          echo "🚀 Triggering auto-trigger-marketplace-deployment.yml for version $NEW_VERSION validation and dry-run deployment"
          gh workflow run auto-trigger-marketplace-deployment.yml --ref main -f new_version="$NEW_VERSION"
          echo "✅ Marketplace deployment validation workflow triggered with version $NEW_VERSION"
        env:
          GH_TOKEN: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}

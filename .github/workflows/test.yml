name: Build and Test

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  authorize:
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && 'external' || 'internal' }}
    runs-on: ubuntu-latest
    steps:
      - run: "true"

  # Guard: the AWS SDK shaded into this jar must stay on the same version as the
  # SDK bundled in liquibase-aws-extension inside the Secure base image. When they
  # drift the classpath carries two SDK versions and the older one wins for some
  # classes -> NoSuchFieldError (the XXHASH3 checksums clash, TECHOPS-622). This
  # fails the build on drift so a skewed jar can never be released. It replaces
  # the (wrong) safety net Dependabot used to provide before it was blocked from
  # bumping software.amazon.awssdk:* in .github/dependabot.yml.
  verify-amazon-aws-version:
    needs: authorize
    runs-on: ubuntu-latest
    # Reads the private liquibase-pro repo via the vault PAT; skip on forks where
    # the OIDC role / PAT are unavailable so external PRs are not blocked.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify amazon.aws.version matches the Secure image's shaded AWS SDK
        env:
          GH_TOKEN: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}
        run: |
          set -euo pipefail
          # The shaded AWS SDK is set by aws-sdk.version in the liquibase-pro ROOT pom
          # (inherited by liquibase-aws-extension via its parent). Read it at the tag that
          # matches the liquibase-secure version this repo builds against, NOT main — main
          # drifts ahead of the released image. Property lives in the root pom, not the
          # extension pom, and is named aws-sdk.version (not amazon.aws.version).
          SECURE_VERSION=$(grep -oE '<liquibase-secure.version>[^<]+</liquibase-secure.version>' pom.xml \
            | head -1 \
            | sed -E 's/<\/?liquibase-secure.version>//g')
          LOCAL=$(grep -oE '<amazon.aws.version>[^<]+</amazon.aws.version>' pom.xml \
            | head -1 \
            | sed -E 's/<\/?amazon.aws.version>//g')
          # Tolerate an empty/failed read (unpublished v<version> tag, transient gh api
          # failure, missing property) so the `if [ -z "$UPSTREAM" ]` guard below can print
          # its descriptive ::error:: and exit 1. Without `|| true`, pipefail + set -e abort
          # here with a bare non-zero exit and the descriptive message never shows.
          UPSTREAM=$(gh api "repos/liquibase/liquibase-pro/contents/pom.xml?ref=v${SECURE_VERSION}" --jq '.content' 2>/dev/null \
            | base64 -d \
            | grep -oE '<aws-sdk.version>[^<]+</aws-sdk.version>' \
            | head -1 \
            | sed -E 's/<\/?aws-sdk.version>//g' || true)
          echo "liquibase-secure version:                   ${SECURE_VERSION:-<empty>}"
          echo "liquibase-pro v${SECURE_VERSION} aws-sdk.version (source of truth): ${UPSTREAM:-<empty>}"
          echo "liquibase-aws-license-service (this repo):   ${LOCAL:-<empty>}"
          if [ -z "$UPSTREAM" ]; then
            echo "::error::Could not read aws-sdk.version from liquibase-pro root pom at tag v${SECURE_VERSION}. Confirm the tag exists and the property is present."
            exit 1
          fi
          if [ "$UPSTREAM" != "$LOCAL" ]; then
            echo "::error::amazon.aws.version drift: this repo pins $LOCAL but liquibase-secure $SECURE_VERSION shades $UPSTREAM. The shaded AWS SDK must match the SDK in the Secure base image (TECHOPS-622/TECHOPS-911). Update <amazon.aws.version> in pom.xml to $UPSTREAM."
            exit 1
          fi
          echo "✅ amazon.aws.version is in sync with liquibase-secure $SECURE_VERSION at $LOCAL"

  build-test:
    needs: authorize
    uses: liquibase/build-logic/.github/workflows/pro-extension-test.yml@main
    secrets: inherit
    with:
      java: "[17, 21, 25]"

  dependabot:
    needs: [authorize, build-test]
    uses: liquibase/build-logic/.github/workflows/dependabot-automerge.yml@main
    secrets: inherit
